<?xml version="1.0" encoding="UTF-8"?>
<!--
  Integrity Compliance & Consulting LLC
  Official ICC Logo Mark — v4 (tested + verified)
  Arc: 180° top-half only, font sized to fit cleanly
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="600" height="600">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&amp;family=Jost:wght@400;500&amp;display=swap');
    </style>

    <radialGradient id="bg-glow" cx="50%" cy="44%" r="52%">
      <stop offset="0%"   stop-color="#3D4F28" stop-opacity="0.60"/>
      <stop offset="100%" stop-color="#252B1A" stop-opacity="0"/>
    </radialGradient>

    <!--
      TOP ARC — strict 180° across the top only
      Center (250,250) r=196
      Start: left equator  (54, 250)  → sweep clockwise (sweep=1)
      End:   right equator (446, 250) → large-arc=0 (small/top arc)
      Text centered with startOffset="50%" text-anchor="middle" = 12 o'clock ✓
    -->
    <path id="arc-top" d="M 54,250 A 196,196 0 0,1 446,250"/>
  </defs>

  <!-- Background -->
  <circle cx="250" cy="250" r="248" fill="#252B1A"/>
  <circle cx="250" cy="250" r="248" fill="url(#bg-glow)"/>

  <!-- Rings -->
  <circle cx="250" cy="250" r="238" fill="none" stroke="rgba(196,168,130,0.17)" stroke-width="0.8"/>
  <circle cx="250" cy="250" r="223" fill="none" stroke="#C4A882"               stroke-width="2.6"/>
  <circle cx="250" cy="250" r="208" fill="none" stroke="rgba(196,168,130,0.14)" stroke-width="0.7"/>

  <!-- Compass diamonds on main ring r=223 -->
  <polygon points="250,21 255.5,27 250,33 244.5,27"     fill="#C4A882"/><!-- 12 o'clock -->
  <polygon points="467,244.5 473,250 467,255.5 461,250" fill="#C4A882"/><!-- 3 o'clock -->
  <polygon points="250,467 255.5,473 250,479 244.5,473" fill="#C4A882"/><!-- 6 o'clock -->
  <polygon points="21,244.5 27,250 21,255.5 15,250"     fill="#C4A882"/><!-- 9 o'clock -->

  <!--
    ARC TEXT — font-size=12.5, letter-spacing=2.5
    "INTEGRITY · COMPLIANCE · CONSULTING" ≈ 36 chars × 9.5px = ~342px total
    180° arc length at r=196 = π×196 ≈ 616px  →  342/616 = 55% usage — plenty of buffer ✓
  -->
  <text font-size="12.5" letter-spacing="2.5" fill="#C4A882"
        font-family="Jost, sans-serif" font-weight="500">
    <textPath href="#arc-top" startOffset="50%" text-anchor="middle">
      INTEGRITY  ·  COMPLIANCE  ·  CONSULTING
    </textPath>
  </text>

  <!--
    ICC MONOGRAM — mathematically centered in circle
    Cormorant Garamond Light cap-height ratio ≈ 0.70
    I:  font-size=112 → cap≈78px  cap-top y=165, baseline y=243
    ── divider y=258 ──
    CC: font-size=102 → cap≈71px  cap-top y=268, baseline y=339
    Monogram center: (165+339)/2 = 252 ≈ 250 ✓
  -->

  <!-- Crown decoration above I -->
  <line x1="236" y1="157" x2="264" y2="157" stroke="#C4A882" stroke-width="0.9" opacity="0.42"/>
  <line x1="202" y1="168" x2="218" y2="168" stroke="#C4A882" stroke-width="0.7" opacity="0.35"/>
  <line x1="282" y1="168" x2="298" y2="168" stroke="#C4A882" stroke-width="0.7" opacity="0.35"/>
  <circle cx="250" cy="152" r="2.4" fill="#C4A882" opacity="0.40"/>

  <!-- I -->
  <text x="250" y="243"
        text-anchor="middle"
        font-family="Cormorant Garamond, Georgia, serif"
        font-size="112" font-weight="300" fill="#EDE8D0">I</text>

  <!-- Divider + diamond tips -->
  <line x1="180" y1="258" x2="320" y2="258" stroke="#C4A882" stroke-width="1.05"/>
  <polygon points="180,253.5 186,258 180,262.5 174,258" fill="#C4A882"/>
  <polygon points="320,253.5 326,258 320,262.5 314,258" fill="#C4A882"/>

  <!-- C  C — symmetrically placed, wide gap -->
  <text x="197" y="339" text-anchor="middle"
        font-family="Cormorant Garamond, Georgia, serif"
        font-size="102" font-weight="300" fill="#EDE8D0">C</text>
  <text x="303" y="339" text-anchor="middle"
        font-family="Cormorant Garamond, Georgia, serif"
        font-size="102" font-weight="300" fill="#EDE8D0">C</text>

  <!-- Bottom badge text -->
  <line x1="198" y1="374" x2="302" y2="374" stroke="rgba(196,168,130,0.30)" stroke-width="0.65"/>
  <text x="250" y="393" text-anchor="middle"
        font-family="Jost, sans-serif" font-size="11.5" font-weight="500"
        letter-spacing="6" fill="#C4A882">NEW JERSEY</text>
  <text x="250" y="413" text-anchor="middle"
        font-family="Jost, sans-serif" font-size="8.5" font-weight="400"
        letter-spacing="3.5" fill="#C4A882" opacity="0.55">DDD COMPLIANCE</text>
</svg>
